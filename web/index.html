<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德州扑克记分工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1 class="login-title">德州扑克记分工具</h1>
      <p class="login-subtitle">请选择登录方式。游客可直接进入查看，管理员输入密码后可录入和修改数据。</p>
      <div class="login-section">
        <button type="button" id="btn-login-guest" class="btn btn-outline btn-full">游客登录（仅查看）</button>
      </div>
      <form id="admin-login-form" class="login-section">
        <label class="form-label" for="admin-password">管理员密码</label>
        <input type="password" id="admin-password" class="form-input" placeholder="请输入管理员密码" autocomplete="current-password">
        <button type="submit" class="btn btn-primary btn-full">管理员登录</button>
      </form>
    </div>
  </div>

  <div id="app" style="display:none">
    <!-- 顶部导航 -->
    <header class="app-header">
      <div class="app-title-row">
        <h1 class="app-title">♠ 记分工具</h1>
        <div class="auth-tools">
          <span id="auth-role-badge" class="role-badge" style="display:none"></span>
          <button type="button" id="btn-logout" class="btn btn-sm btn-outline" style="display:none">退出登录</button>
        </div>
      </div>
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="entry">记分录入</button>
        <button class="tab-btn" data-tab="leaderboard">排行榜</button>
        <button class="tab-btn" data-tab="chart">积分明细</button>
        <button class="tab-btn" data-tab="members">成员管理</button>
      </nav>
    </header>

    <!-- 主内容区 -->
    <main id="main-content">
      <!-- 记分录入页 -->
      <section id="page-entry" class="page active">
        <!-- 录入表单 -->
        <div class="card entry-form-card">
          <h2 class="card-title">录入积分</h2>
          <p id="entry-readonly-tip" class="readonly-tip" style="display:none">游客登录仅可查看当前数据，不能录入积分。</p>
          <form id="entry-form">
            <div class="form-group">
              <label class="form-label">输入积分（留空则不记录）</label>
              <div id="entry-members">
                <!-- 由 JS 动态渲染 -->
              </div>
            </div>
            <div class="form-row">
              <div class="form-group flex-1">
                <label class="form-label">时间</label>
                <div class="time-picker">
                  <input type="date" id="entry-date" class="form-input" required>
                  <input type="time" id="entry-time" class="form-input" required>
                </div>
              </div>
              <div class="form-group flex-1">
                <label class="form-label" for="entry-note">备注（选填）</label>
                <input type="text" id="entry-note" class="form-input" placeholder="局号 / 场地">
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">确认录入</button>
          </form>
        </div>

        <!-- 历史记录 -->
        <div class="card history-card">
          <div class="card-header">
            <h2 class="card-title">历史记录</h2>
            <div class="history-filters">
              <select id="history-member-filter" class="form-input form-select-sm">
                <option value="">全部成员</option>
              </select>
            </div>
          </div>
          <div id="history-list" class="history-list">
            <!-- 由 JS 动态渲染 -->
          </div>
        </div>
      </section>

      <!-- 排行榜页 -->
      <section id="page-leaderboard" class="page">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">排行榜</h2>
          </div>
          <!-- 时间筛选 -->
          <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">总榜</button>
            <button class="filter-btn" data-filter="today">今日</button>
            <button class="filter-btn" data-filter="week">本周</button>
            <button class="filter-btn" data-filter="month">本月</button>
            <button class="filter-btn" data-filter="7d">近7天</button>
            <button class="filter-btn" data-filter="30d">近30天</button>
          </div>
          <div class="custom-date-range" id="custom-date-range">
            <label class="form-label-sm">自定义范围：</label>
            <input type="date" id="start-date" class="form-input form-input-sm">
            <span class="date-separator">~</span>
            <input type="date" id="end-date" class="form-input form-input-sm">
            <button id="apply-date-filter" class="btn btn-sm">筛选</button>
          </div>
          <!-- 排行对比模式 -->
          <div class="compare-toggle">
            <label class="switch-label">
              <input type="checkbox" id="compare-mode">
              <span class="switch-text">显示总积分对比</span>
            </label>
          </div>
          <!-- 排行表格 -->
          <div class="table-wrap">
            <table class="rank-table" id="rank-table">
              <thead>
                <tr>
                  <th class="col-rank">排名</th>
                  <th class="col-name">成员</th>
                  <th class="col-score">本期积分</th>
                  <th class="col-total" id="total-col-header" style="display:none">总积分</th>
                </tr>
              </thead>
              <tbody id="rank-body">
                <!-- 由 JS 动态渲染 -->
              </tbody>
            </table>
          </div>
          <div id="rank-empty" class="empty-state">
            <p>暂无记录</p>
          </div>
        </div>
      </section>

      <!-- 积分明细页 -->
      <section id="page-chart" class="page">
        <div class="card">
          <h2 class="card-title">积分明细</h2>
          <div class="form-group">
            <label class="form-label">选择成员（可多选）</label>
            <div class="member-checkbox-group" id="chart-members"></div>
          </div>
          <div class="chart-mode-bar">
            <button class="chart-mode-btn active" data-mode="session">按次</button>
            <button class="chart-mode-btn" data-mode="cumulative">累计</button>
          </div>
          <div class="chart-wrap">
            <canvas id="score-chart"></canvas>
          </div>
          <div id="chart-empty" class="empty-state">
            <p>请先选择成员</p>
          </div>
          <div id="chart-summary" class="chart-summary" style="display:none"></div>
        </div>
      </section>

      <!-- 成员管理页 -->
      <section id="page-members" class="page">
        <div id="member-add-card" class="card">
          <h2 class="card-title">添加成员</h2>
          <p id="members-readonly-tip" class="readonly-tip" style="display:none">游客登录仅可查看成员列表，不能新增或删除成员。</p>
          <form id="member-form" class="inline-form">
            <input type="text" id="member-name" class="form-input flex-1" placeholder="输入成员名称" required maxlength="20">
            <button type="submit" class="btn btn-primary">添加</button>
          </form>
        </div>
        <div class="card">
          <h2 class="card-title">成员列表 <span id="member-count" class="badge"></span></h2>
          <div id="member-list">
            <!-- 由 JS 动态渲染 -->
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- 编辑弹窗 -->
  <div id="edit-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h3 class="modal-title">编辑记录</h3>
      <form id="edit-form">
        <div class="form-group">
          <label class="form-label">成员</label>
          <select id="edit-member" class="form-input"></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-score">积分</label>
          <input type="number" id="edit-score" class="form-input" step="0.1" required>
        </div>
        <div class="form-group">
          <label class="form-label">时间</label>
          <div class="time-picker">
            <input type="date" id="edit-date" class="form-input" required>
            <input type="time" id="edit-time" class="form-input" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-note">备注</label>
          <input type="text" id="edit-note" class="form-input" placeholder="局号 / 场地">
        </div>
        <div class="modal-actions">
          <button type="button" id="edit-cancel" class="btn btn-outline">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div id="confirm-modal" class="modal-overlay" style="display:none">
    <div class="modal modal-sm">
      <h3 class="modal-title" id="confirm-title">确认删除</h3>
      <p id="confirm-message">确定要删除此记录吗？</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn btn-outline">取消</button>
        <button id="confirm-ok" class="btn btn-danger">确定</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
