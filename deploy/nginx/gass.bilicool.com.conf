# Nginx 站点配置：gass.bilicool.com
#
# 实际部署路径（与面板/服务器现状对齐）：
#   conf 路径    /etc/nginx/conf.d/gass.bilicool.com.conf
#   站点根       /var/www/gasstoplist
#   证书目录     /etc/letsencrypt/certificates/gass.bilicool.com/
#   续期挑战目录 /etc/letsencrypt/certificates/gass.bilicool.com/challenges/
#
# 用法：
#   sudo cp deploy/nginx/gass.bilicool.com.conf /etc/nginx/conf.d/gass.bilicool.com.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 后端：Docker 容器（GassTopList）监听 127.0.0.1:3840，由本配置的 /api/ 反代进入。

# ── HTTP → HTTPS 强制跳转 ───────────────────────────────────────
server {
    listen 80;
    server_name gass.bilicool.com;
    rewrite ^(.*) https://$host$1 permanent;
}

# ── HTTPS 主站 ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name gass.bilicool.com;

    root /var/www/gasstoplist;
    index index.html index.htm;
    charset utf-8;

    # 证书（由面板/Let's Encrypt 自动续期维护）
    ssl_certificate     /etc/letsencrypt/certificates/gass.bilicool.com/chained.pem;
    ssl_certificate_key /etc/letsencrypt/certificates/gass.bilicool.com/domain.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:50m;
    ssl_prefer_server_ciphers on;

    # ACME 续期挑战（保持面板原样，证书续期会写到这里）
    location /.well-known/acme-challenge/ {
        alias /etc/letsencrypt/certificates/gass.bilicool.com/challenges/;
        try_files $uri =404;
    }

    # 基本安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # 静态资源压缩
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # 静态资源长缓存（index.html 不缓存，方便发版即时生效）
    location ~* \.(?:css|js|woff2?|ttf|eot|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # API 反代到 Docker 后端（GassTopList 容器，仅本机回环）
    location /api/ {
        proxy_pass http://127.0.0.1:3840;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 与后端 express.json({ limit: '20mb' }) 对齐，留少量 buffer
        client_max_body_size 25m;
        proxy_read_timeout   60s;
        proxy_send_timeout   60s;
    }

    # 静态文件兜底（本应用不是 SPA，缺资源直接 404）
    location / {
        try_files $uri $uri/ =404;
    }

    # 屏蔽隐藏文件 / 编辑器备份
    location ~ /\.(?!well-known).* { deny all; }
    location ~ ~$                  { deny all; }

    access_log /var/log/nginx/gass.bilicool.com.access.log;
    error_log  /var/log/nginx/gass.bilicool.com.error.log warn;
}
